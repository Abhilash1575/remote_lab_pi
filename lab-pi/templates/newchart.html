<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Serial Plotter - Embedded Virtual Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
html, body { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background: #0a0a12; color: #e0e0e0; overflow: hidden; }
#CRO_CONTAINER { display: flex; flex-direction: column; height: 100vh; background: #0a0a12; }
.control-panel { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 12px 16px; background: #14141f; border-bottom: 1px solid #2a2a3a; }
.control-group { display: flex; gap: 8px; align-items: center; }
.control-group label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.osc-button { padding: 6px 12px; border-radius: 4px; border: 1px solid #333; cursor: pointer; background: #1e1e2e; color: #00f0ff; font-size: 12px; font-weight: 600; transition: all 0.15s; }
.osc-button:hover { background: #2a2a3e; border-color: #00f0ff; }
.osc-button.active { background: #00f0ff; color: #041726; }
.osc-select { padding: 6px 10px; border-radius: 4px; border: 1px solid #333; background: #1e1e2e; color: #e0e0e0; font-size: 12px; min-width: 90px; }
.osc-input { padding: 6px 8px; border-radius: 4px; border: 1px solid #333; background: #1e1e2e; color: #e0e0e0; font-size: 12px; width: 60px; text-align: center; }
.channel-toggle { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 4px; border: 1px solid #333; cursor: pointer; }
.channel-toggle.on { border-color: #00f0ff; background: rgba(0,240,255,0.1); }
.channel-toggle.on .channel-dot { background: #00f0ff; box-shadow: 0 0 8px #00f0ff; }
.channel-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; }
.trigger-indicator { width: 8px; height: 8px; border-radius: 50%; background: #00ff7f; }
.trigger-indicator.waiting { background: #ffaa00; animation: pulse 0.5s infinite; }
.trigger-indicator.triggered { background: #00ff7f; box-shadow: 0 0 10px #00ff7f; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.chart-area { flex: 1; position: relative; min-height: 0; }
.chart-canvas { width: 100%; height: 100%; }
.scale-display { position: absolute; top: 10px; right: 10px; font-family: 'Roboto Mono', monospace; font-size: 11px; color: #666; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px; }
.scale-display div { margin: 2px 0; }
.status-bar { display: flex; gap: 16px; padding: 8px 16px; background: #14141f; border-top: 1px solid #2a2a3a; font-size: 11px; color: #666; }
.status-bar .stat { display: flex; align-items: center; gap: 6px; }
.status-bar .stat-value { color: #00f0ff; font-family: 'Roboto Mono', monospace; }
</style>
</head>
<body>
<div id="CRO_CONTAINER">
  <div class="control-panel">
    <div class="control-group">
      <h3 style="margin:0; color:#00f0ff; font-size:16px;">Serial Plotter</h3>
    </div>
    
    <div id="plotterControls" style="display:flex; flex-direction:row; gap:12px; align-items:center;">
      <div class="control-group">
        <label>X-Axis</label>
        <select id="xAxisFilter" class="osc-select">
          <option value="time">Time (s)</option>
          <option value="samples">Samples</option>
        </select>
      </div>
      <div class="control-group">
        <label>Time/Div</label>
        <select id="timeDiv" class="osc-select">
          <option value="10">10ms</option>
          <option value="20">20ms</option>
          <option value="50">50ms</option>
          <option value="100" selected>100ms</option>
          <option value="200">200ms</option>
          <option value="500">500ms</option>
          <option value="1000">1s</option>
        </select>
      </div>
      <div class="control-group">
        <button id="zoomReset" class="osc-button" title="Reset Zoom">■</button>
        <button id="zoomOut" class="osc-button" title="Zoom Out">-</button>
        <button id="zoomIn" class="osc-button" title="Zoom In">+</button>
      </div>
      <div class="control-group">
        <label>CH1</label>
        <select id="ch1Variable" class="osc-select"><option value="">Auto</option></select>
        <div id="ch1Toggle" class="channel-toggle on"><div class="channel-dot"></div></div>
      </div>
      <div class="control-group">
        <label>CH2</label>
        <select id="ch2Variable" class="osc-select"><option value="">Auto</option></select>
        <div id="ch2Toggle" class="channel-toggle"><div class="channel-dot"></div></div>
      </div>
      <div class="control-group">
        <button id="runStopBtn" class="osc-button active">RUN</button>
        <button id="clearBtn" class="osc-button">Clear</button>
        <button id="exportCsvBtn" class="osc-button">Export CSV</button>
      </div>
    </div>

    <div class="control-group" style="margin-left: auto;">
      <button id="backBtn" class="osc-button">Back to Lab</button>
    </div>
  </div>
  
  <div class="chart-area">
    <canvas id="mainChart" class="chart-canvas"></canvas>
    <div class="scale-display">
      <div id="scaleTimeDiv">Time: 100ms/div</div>
      <div id="scaleVolts1">CH1: Auto</div>
      <div id="scaleVolts2">CH2: Auto</div>
      <div id="dataRate">Rate: 0/s</div>
    </div>
  </div>
  
  <div class="status-bar">
    <div class="stat">Samples: <span class="stat-value" id="sampleCount">0</span></div>
    <div class="stat">Buffer: <span class="stat-value" id="bufferSize">0</span></div>
    <div class="stat">Min: <span class="stat-value" id="ch1Min">-</span></div>
    <div class="stat">Max: <span class="stat-value" id="ch1Max">-</span></div>
    <div class="stat">Freq: <span class="stat-value" id="frequency">-</span></div>
  </div>
</div>

<script>
const socket = io.connect(window.location.origin, { transports: ['websocket', 'polling'] });

const chartCtx = document.getElementById('mainChart').getContext('2d');
const DATA_BUFFER_SIZE = 2000;
const dataBuffer = [];
let isRunning = true;
let sampleCount = 0;
let ch1Enabled = true;
let ch2Enabled = false;
let ch1Min = null, ch1Max = null;
let lastDataTime = Date.now();
let dataRateCounter = 0;

const chart = new Chart(chartCtx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'CH1', data: [], borderColor: '#00f0ff', borderWidth: 1.5, pointRadius: 0, fill: false, yAxisID: 'y', tension: 0, spanGaps: true },
      { label: 'CH2', data: [], borderColor: '#00ff7f', borderWidth: 1.5, pointRadius: 0, fill: false, yAxisID: 'y', hidden: true, tension: 0, spanGaps: true }
    ]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      x: {
        type: 'linear',
        grid: { color: '#3a3a5a' },
        title: { display: true, text: 'Time (ms)', color: '#888' },
        ticks: { color: '#666' }
      },
      y: {
        grid: { color: '#3a3a5a' },
        title: { display: true, text: 'Value', color: '#888' },
        ticks: { color: '#666' }
      }
    },
    plugins: {
      legend: { display: true, labels: { color: '#888', font: { size: 10 } } }
    }
  }
});

let zoomLevel = 1.0;

function updateScales() {
  const timeWindow = (parseInt(document.getElementById('timeDiv').value) * 10) / zoomLevel;
  const xAxisMode = document.getElementById('xAxisFilter').value;
  
  if (xAxisMode === 'samples') {
    chart.options.scales.x.min = -timeWindow / 10; // Rough conversion for samples
    chart.options.scales.x.max = 0;
    chart.options.scales.x.title.text = 'Samples (backwards)';
  } else {
    chart.options.scales.x.min = -timeWindow;
    chart.options.scales.x.max = 0;
    chart.options.scales.x.title.text = 'Time (ms)';
  }
  
  document.getElementById('scaleTimeDiv').textContent = `Window: ${Math.round(timeWindow)}ms`;
  chart.update('none');
}

document.getElementById('timeDiv').addEventListener('change', updateScales);
document.getElementById('xAxisFilter').addEventListener('change', updateScales);

document.getElementById('zoomIn').addEventListener('click', () => { zoomLevel *= 1.2; updateScales(); });
document.getElementById('zoomOut').addEventListener('click', () => { zoomLevel /= 1.2; updateScales(); });
document.getElementById('zoomReset').addEventListener('click', () => { zoomLevel = 1.0; updateScales(); });

document.getElementById('ch1Toggle').addEventListener('click', () => {
  ch1Enabled = !ch1Enabled;
  document.getElementById('ch1Toggle').classList.toggle('on', ch1Enabled);
  chart.data.datasets[0].hidden = !ch1Enabled;
  chart.update('none');
});

document.getElementById('ch2Toggle').addEventListener('click', () => {
  ch2Enabled = !ch2Enabled;
  document.getElementById('ch2Toggle').classList.toggle('on', ch2Enabled);
  chart.data.datasets[1].hidden = !ch2Enabled;
  chart.update('none');
});

document.getElementById('runStopBtn').addEventListener('click', () => {
  isRunning = !isRunning;
  document.getElementById('runStopBtn').textContent = isRunning ? 'RUN' : 'STOP';
  document.getElementById('runStopBtn').classList.toggle('active', isRunning);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  dataBuffer.length = 0;
  ch1Min = null; ch1Max = null;
  chart.data.datasets[0].data = [];
  chart.data.datasets[1].data = [];
  chart.update('none');
});

document.getElementById('exportCsvBtn').addEventListener('click', () => {
  if (dataBuffer.length === 0) return;
  let csv = 'Timestamp,CH1,CH2\n';
  dataBuffer.forEach(p => csv += `${p.timestamp},${p.ch1},${p.ch2 || ''}\n`);
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'plotter_data.csv'; a.click();
});

function chartLoop() {
  if (!isRunning) { requestAnimationFrame(chartLoop); return; }
  
  const now = Date.now();
  const timeWindow = parseInt(document.getElementById('timeDiv').value) * 10;
  
  // Update data rate
  if (now - lastDataTime >= 1000) {
    document.getElementById('dataRate').textContent = `Rate: ${dataRateCounter}/s`;
    dataRateCounter = 0;
    lastDataTime = now;
  }

  const ch1Data = [];
  const ch2Data = [];
  
  for (let i = 0; i < dataBuffer.length; i++) {
    const p = dataBuffer[i];
    const x = p.timestamp - now;
    if (x < -timeWindow) continue;
    
    ch1Data.push({ x, y: p.ch1 });
    if (p.ch2 !== null) ch2Data.push({ x, y: p.ch2 });
  }
  
  chart.data.datasets[0].data = ch1Data;
  chart.data.datasets[1].data = ch2Data;
  chart.update('none');
  
  updateStats();
  requestAnimationFrame(chartLoop);
}

function updateStats() {
  document.getElementById('sampleCount').textContent = sampleCount;
  document.getElementById('bufferSize').textContent = dataBuffer.length;
  document.getElementById('ch1Min').textContent = ch1Min !== null ? ch1Min.toFixed(2) : '-';
  document.getElementById('ch1Max').textContent = ch1Max !== null ? ch1Max.toFixed(2) : '-';
}

socket.on('sensor_data', (payload) => {
  if (!isRunning || !payload) return;
  dataRateCounter++;
  sampleCount++;
  
  const keys = Object.keys(payload).filter(k => !k.startsWith('_'));
  const var1 = document.getElementById('ch1Variable').value || keys[0];
  const var2 = document.getElementById('ch2Variable').value || keys[1];
  
  // Dynamic variable selection
  const ch1Select = document.getElementById('ch1Variable');
  const ch2Select = document.getElementById('ch2Variable');
  keys.forEach(k => {
    if (!Array.from(ch1Select.options).some(o => o.value === k)) {
      ch1Select.add(new Option(k, k));
      ch2Select.add(new Option(k, k));
    }
  });

  const val1 = payload[var1];
  const val2 = payload[var2];
  
  if (val1 !== undefined) {
    if (ch1Min === null || val1 < ch1Min) ch1Min = val1;
    if (ch1Max === null || val1 > ch1Max) ch1Max = val1;
    
    dataBuffer.push({ timestamp: Date.now(), ch1: val1, ch2: val2 !== undefined ? val2 : null });
    if (dataBuffer.length > DATA_BUFFER_SIZE) dataBuffer.shift();
  }
});

updateScales();
chartLoop();

document.getElementById('backBtn').addEventListener('click', () => {
  const urlParams = new URLSearchParams(window.location.search);
  const key = urlParams.get('key');
  window.location.href = '/experiment?key=' + key;
});
</script>
</body>
</html>
